# Deploy the workbench renderer to Cloudflare Pages, so the cockpit is reachable
# from any browser — not only from the local Electron build. It stays gated by
# the same admin JWT + tier check the desktop app uses (lib/elle.ts verifyToken
# against the worker), so a public URL still opens only for superadmin/admin/
# cofounder sessions.
#
# The workbench is glass: it talks to the deployed elle-worker, so it works from
# anywhere. The Electron-only pieces degrade cleanly on the web — every native
# call is window.elleNative?.… (optional-chained), so the sovereign KV cache and
# the connect-back sandbox simply read "unavailable / path closed" when the local
# agent isn't running. That is the point: a surface you can reach even when the
# sovereign connection isn't there.
name: Deploy Workbench (Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

# One Pages deploy at a time — a push and a manual run shouldn't race.
concurrency:
  group: deploy-workbench-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build + deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # --ignore-scripts skips the Electron binary download; the web build only
      # needs Vite. Plain `vite build` targets the web (base '/'), not file://.
      - run: npm ci --ignore-scripts
      - run: npm run build
      # Create the Pages project on first run — wrangler deploy does NOT
      # auto-create it, so without this the first deploy fails "Project not
      # found". Idempotent: a re-run errors "already exists", swallowed by `|| true`.
      - name: Ensure Pages project exists
        run: npx --yes wrangler@4 pages project create elle-workbench --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f60c2e6068e002f5dbad7cd562a5c165
      # public/_redirects already ships the SPA fallback (/* /index.html 200) into dist/.
      - name: Deploy dist to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy dist --project-name=elle-workbench --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # The account id is not a secret — it already ships in elle-worker's
          # committed config. The API token (with Pages:Edit) is the credential.
          CLOUDFLARE_ACCOUNT_ID: f60c2e6068e002f5dbad7cd562a5c165
