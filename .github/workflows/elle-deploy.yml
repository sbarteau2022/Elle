name: Deploy Elle (frontend)

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time — same reasoning as elle-worker's deploy workflow.
concurrency:
  group: deploy-elle
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare (Workers static assets)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # wrangler requires Node 22+ (elle-worker-deploy.yml uses 24 for
          # the same reason) — ci.yml's Node 20 only has to satisfy tsc/vitest,
          # never wrangler itself, which is why that one gets away with less.
          node-version: '24'
          cache: 'npm'
      # --ignore-scripts: skip the Electron binary download, same as ci.yml —
      # this job only needs the web (non-Electron) Vite build.
      - run: npm ci --ignore-scripts
      - name: Build (web)
        run: npm run build
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
